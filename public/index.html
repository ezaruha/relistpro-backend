<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RelistPro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--card:#141414;--card2:#1c1c1c;--border:#252525;
  --text:#e2e8f0;--sub:#94a3b8;--accent:#6366f1;--accent2:#818cf8;
  --green:#22c55e;--red:#ef4444;--radius:10px;--shadow:0 4px 24px rgba(0,0,0,.5);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
button{cursor:pointer;border:none;font-family:inherit;transition:.15s}
input{font-family:inherit}

/* ── Auth ── */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#1e1b4b 0%,var(--bg) 60%)}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;width:340px;box-shadow:var(--shadow)}
.auth-box h1{font-size:26px;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-box p{color:var(--sub);font-size:13px;margin-bottom:24px}
.tab-sw{display:flex;background:var(--card2);border-radius:8px;padding:3px;margin-bottom:20px;gap:3px}
.tab-sw button{flex:1;padding:7px;border-radius:6px;background:transparent;color:var(--sub);font-size:13px;border:none}
.tab-sw button.on{background:var(--accent);color:#fff}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--sub);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;outline:none}
.field input:focus{border-color:var(--accent)}
.btn-primary{width:100%;background:var(--accent);color:#fff;border-radius:8px;padding:11px;font-weight:600;font-size:14px;margin-top:4px}
.btn-primary:hover{background:var(--accent2)}
.auth-err{color:var(--red);font-size:12px;margin-top:8px;display:none;text-align:center}

/* ── App ── */
#app{display:none}
#app.visible{display:block}
header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;gap:16px}
.logo{font-size:17px;font-weight:700;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.hdr-user{font-size:12px;color:var(--sub)}
.btn-out{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;background:var(--card2);border:1px solid var(--border);color:var(--sub)}
.btn-out:hover{color:var(--red);border-color:var(--red)}

main{max-width:640px;margin:0 auto;padding:28px 20px 60px}

/* ── Sections ── */
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden}
.sec-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-hdr h2{font-size:14px;font-weight:600}
.sec-hdr .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.sec-hdr .dot.green{background:var(--green)}
.sec-hdr .dot.red{background:var(--red)}
.sec-body{padding:18px 20px}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.row:last-child{border:none}
.row-label{font-size:12px;color:var(--sub)}
.row-val{font-size:13px;font-weight:500}
.row-val.accent{color:var(--accent2)}
.row-val.green{color:var(--green)}

/* ── Account field inline edit ── */
.edit-row{display:flex;gap:8px;align-items:center;margin-top:12px}
.edit-row input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-size:13px;outline:none}
.edit-row input:focus{border-color:var(--accent)}
.btn-save{padding:7px 14px;border-radius:7px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;border:none;white-space:nowrap}
.btn-save:hover{background:var(--accent2)}
.btn-save:disabled{opacity:.5;cursor:default}

/* ── Plans ── */
.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
.plan-card{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:14px;cursor:default}
.plan-card.current{border-color:var(--accent)}
.plan-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.plan-name.free{color:var(--sub)}
.plan-name.pro{color:var(--accent2)}
.plan-name.business{color:#f59e0b}
.plan-price{font-size:20px;font-weight:700;margin-bottom:8px}
.plan-feat{font-size:10px;color:var(--sub);line-height:1.8}
.badge-current{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(99,102,241,.15);color:var(--accent2);text-transform:uppercase;margin-bottom:6px}
.btn-upgrade{width:100%;margin-top:10px;padding:7px;border-radius:7px;font-size:11px;font-weight:600;background:var(--accent);color:#fff;border:none}
.btn-upgrade:hover{background:var(--accent2)}
.btn-upgrade:disabled{opacity:.4;cursor:default}

/* ── Connected account card ── */
.acct-card{display:flex;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:14px 16px}
.acct-icon{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.acct-info{flex:1;min-width:0}
.acct-domain{font-size:13px;font-weight:600}
.acct-sub{font-size:11px;color:var(--sub);margin-top:2px}
.acct-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(34,197,94,.1);color:var(--green);flex-shrink:0}
.no-acct{text-align:center;padding:20px;color:var(--sub);font-size:13px}
.no-acct strong{display:block;margin-bottom:6px;color:var(--text);font-size:14px}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;padding:10px 16px;border-radius:9px;font-size:12px;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999}
#toast.show{opacity:1}
#toast.ok{background:#22c55e}
#toast.err{background:var(--red)}
#toast.info{background:#1d1d1f}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <h1>RelistPro</h1>
    <p>Manage your account and subscription</p>
    <div class="tab-sw">
      <button id="tabLogin" class="on" onclick="showTab('login')">Sign In</button>
      <button id="tabReg" onclick="showTab('register')">Register</button>
    </div>
    <div id="loginForm">
      <div class="field"><label>Username</label><input id="l-user" placeholder="your username" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="l-pw" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-primary" onclick="doLogin()">Sign In</button>
    </div>
    <div id="regForm" style="display:none">
      <div class="field"><label>Username</label><input id="r-user" placeholder="choose a username" autocomplete="username"></div>
      <div class="field"><label>Email (optional)</label><input id="r-email" type="email" placeholder="you@example.com" autocomplete="email"></div>
      <div class="field"><label>Password</label><input id="r-pw" type="password" placeholder="min 8 characters" autocomplete="new-password"></div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
    </div>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">RelistPro</div>
    <span class="hdr-user" id="hdr-user"></span>
    <button class="btn-out" onclick="doLogout()">Sign out</button>
  </header>
  <main>

    <!-- Connected Vinted Account -->
    <div class="section">
      <div class="sec-hdr">
        <div class="dot green" id="acct-dot"></div>
        <h2>Connected Vinted Account</h2>
      </div>
      <div class="sec-body" id="acct-body">
        <div class="no-acct"><strong>No account connected</strong>Install the Chrome extension, open any Vinted page and click Sync to connect.</div>
      </div>
    </div>

    <!-- Account Settings -->
    <div class="section">
      <div class="sec-hdr">
        <div class="dot"></div>
        <h2>Account Settings</h2>
      </div>
      <div class="sec-body">
        <div class="row"><span class="row-label">Username</span><span class="row-val" id="set-username">—</span></div>
        <div class="row" style="border:none;flex-direction:column;align-items:flex-start;gap:6px">
          <span class="row-label">Email</span>
          <div class="edit-row" style="width:100%">
            <input id="set-email" placeholder="Add your email address" type="email">
            <button class="btn-save" id="btn-save-email" onclick="saveEmail()">Save</button>
          </div>
          <span style="font-size:11px;color:var(--sub)">Used for account recovery and notifications</span>
        </div>
      </div>
    </div>

    <!-- Subscription -->
    <div class="section">
      <div class="sec-hdr">
        <div class="dot accent"></div>
        <h2>Subscription</h2>
      </div>
      <div class="sec-body">
        <div class="plans" id="plans-grid">
          <div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--sub);font-size:13px">Loading plans…</div>
        </div>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('rp_token') || '';
let profile = null;

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type||'info');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', type === 'err' ? 5000 : 3000);
}

function showTab(t) {
  document.getElementById('tabLogin').classList.toggle('on', t === 'login');
  document.getElementById('tabReg').classList.toggle('on', t === 'register');
  document.getElementById('loginForm').style.display = t === 'login' ? '' : 'none';
  document.getElementById('regForm').style.display = t === 'register' ? '' : 'none';
  document.getElementById('auth-err').style.display = 'none';
}

function showErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg;
  el.style.display = 'block';
}

async function api(path, method, body) {
  const opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

async function doLogin() {
  const user = document.getElementById('l-user').value.trim();
  const pw = document.getElementById('l-pw').value;
  if (!user || !pw) { showErr('Enter username and password'); return; }
  const r = await fetch(API + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: user, password: pw }) });
  const d = await r.json();
  if (!r.ok) { showErr(d.error || 'Login failed'); return; }
  token = d.token;
  localStorage.setItem('rp_token', token);
  startApp();
}

async function doRegister() {
  const user = document.getElementById('r-user').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pw = document.getElementById('r-pw').value;
  if (!user || !pw) { showErr('Username and password required'); return; }
  if (pw.length < 8) { showErr('Password must be at least 8 characters'); return; }
  const r = await fetch(API + '/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: user, password: pw, email }) });
  const d = await r.json();
  if (!r.ok) { showErr(d.error || 'Registration failed'); return; }
  token = d.token;
  localStorage.setItem('rp_token', token);
  startApp();
}

function doLogout() {
  token = '';
  localStorage.removeItem('rp_token');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('authScreen').style.display = 'flex';
}

async function startApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  try {
    const [prof, session, plans, sub] = await Promise.all([
      api('/api/user/profile'),
      api('/api/session/status'),
      api('/api/subscriptions/plans'),
      api('/api/subscriptions/current')
    ]);
    profile = prof;
    renderProfile(prof);
    renderSession(session);
    renderPlans(plans, sub);
  } catch(e) {
    toast('Failed to load account data', 'err');
  }
}

function renderProfile(p) {
  document.getElementById('hdr-user').textContent = p.username || '';
  document.getElementById('set-username').textContent = p.username || '—';
  document.getElementById('set-email').value = p.email || '';
}

function renderSession(s) {
  const dot = document.getElementById('acct-dot');
  const body = document.getElementById('acct-body');
  if (s && s.active) {
    dot.className = 'dot green';
    const domain = s.domain || 'vinted';
    const memberId = s.memberId || '—';
    const since = s.storedAt ? new Date(s.storedAt).toLocaleDateString('en', { day:'numeric', month:'short', year:'numeric' }) : null;
    body.innerHTML = '<div class="acct-card">' +
      '<div class="acct-icon">👗</div>' +
      '<div class="acct-info">' +
        '<div class="acct-domain">' + domain + '</div>' +
        '<div class="acct-sub">Member ID: ' + memberId + (since ? ' · Synced ' + since : '') + '</div>' +
      '</div>' +
      '<div class="acct-badge">Connected</div>' +
    '</div>' +
    '<p style="font-size:11px;color:var(--sub);margin-top:12px">Re-sync from the extension to refresh your session.</p>';
  } else {
    dot.className = 'dot red';
    body.innerHTML = '<div class="no-acct"><strong>No Vinted account connected</strong>Open any Vinted page with the Chrome extension installed, then click the RelistPro button to sync.</div>';
  }
}

function renderPlans(plansData, sub) {
  const plans = plansData && plansData.plans ? plansData.plans : {};
  const current = sub && sub.plan ? sub.plan : 'free';
  const order = ['free', 'pro', 'business'];
  const labels = { free: 'Free', pro: 'Pro', business: 'Business' };
  const prices = { free: '£0/mo', pro: '£9.99/mo', business: '£24.99/mo' };
  const feats = {
    free: ['100 reposts/month', '1 schedule', 'Basic wardrobe sync'],
    pro: ['Unlimited reposts', '10 schedules', 'Priority sync', 'Bulk repost'],
    business: ['Everything in Pro', 'Multiple accounts', 'API access', 'Priority support']
  };
  let h = '';
  order.forEach(plan => {
    const isCurrent = plan === current;
    h += '<div class="plan-card' + (isCurrent ? ' current' : '') + '">';
    if (isCurrent) h += '<div class="badge-current">Current</div><br>';
    h += '<div class="plan-name ' + plan + '">' + labels[plan] + '</div>';
    h += '<div class="plan-price">' + prices[plan] + '</div>';
    h += '<div class="plan-feat">' + feats[plan].join('<br>') + '</div>';
    if (!isCurrent) {
      h += '<button class="btn-upgrade" onclick="upgrade(\'' + plan + '\')">Upgrade</button>';
    }
    h += '</div>';
  });
  document.getElementById('plans-grid').innerHTML = h;
}

async function upgrade(plan) {
  const r = await api('/api/subscriptions/checkout', 'POST', {
    plan,
    successUrl: window.location.href + '?success=1',
    cancelUrl: window.location.href
  });
  if (r.url) { window.location.href = r.url; }
  else toast(r.error || 'Checkout unavailable — Stripe not configured', 'err');
}

async function saveEmail() {
  const email = document.getElementById('set-email').value.trim();
  const btn = document.getElementById('btn-save-email');
  btn.disabled = true;
  const r = await api('/api/user/profile', 'PATCH', { email });
  btn.disabled = false;
  if (r.ok) toast('Email saved', 'ok');
  else toast(r.error || 'Save failed', 'err');
}

// Enter key support for auth forms
document.getElementById('l-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('r-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

// Auto-login if token stored
if (token) {
  startApp().catch(() => {
    token = '';
    localStorage.removeItem('rp_token');
  });
} else {
  document.getElementById('authScreen').style.display = 'flex';
}
</script>
</body>
</html>
